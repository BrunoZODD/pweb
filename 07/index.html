<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fontes e cores</title>
    <style type="text/css">

.fonteserif {
    font-family: "times New roman";
    font-size: 80px;
}
.fontsans-serif {
    font-family: "Verdana";
    font-size: 40px;
}
.fontemonospace {
    font-family: "courier new";
    font-size: 20px;
}



    </style>
</head>
<body>  

 <div class="conteudo">
    <p class="fonteserif">programacao web</p>
    <p class="fontsans-serif">programacao web</p>
    <p class="fontemonospace">programacao web</p>


 </div>




    
</body>
</html>
