<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body {
    margin: 0;
}
.head {
    background-color: lightblue;
    
}
#fixo {
    position: fixed;
    width: 100%;
    height: 50px;
    top: 0;
}
.foo {
    background-color: lightpink;
}
#foo {
    position: fixed;
    width: 100%;
    height: 50px;
    bottom: 0;
}
.float {
    display: flex;
}
#left {
    background-color: lightcoral;
    width: 25%;
    height: 100%;
}
#right {
    background-color: lightcoral;
    width: 25%;
    height: 100%;
}
#center {
    background-color: lightgreen;
    width: 50%;
    height: 100%;
}
    </style>
</head>
<body>
<div id="fixo" class="head">
    Header 100%
</div>
<div class="float">
<div id="left">
    Left 25%
</div>
<div id="center">
    Center 50%
</div> 
<div id="right">
    Right 25%
</div>



</div>



<div id="foo" class="foo">
    Fooster 100%
</div>


    
</body>
</html>
