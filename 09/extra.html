<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body {
    margin: 0;
}
#fixo {
    position: fixed;
    width: 100%;
    height: 50px;
    top: 0;
    background-color: lightblue;
}
#foo {
    position: fixed;
    width: 100%;
    height: 50px;
    bottom: 0;
    background-color: lightpink;
}
.float {
    display: flex;
}
#left {
    background-color: lightcoral;
    width: 25%;
    height: 100%;
    left: 0;
}
#right {
    background-color: lightcoral;
    width: 25%;
    height: 100%;
    right: 0;
}
#center {
    background-color: lightgreen;
    width: 50%;
    height: 100%;
}
    </style>
</head>
<body>
<div class="float">
    
    <div id="fixo">
        Header 100%
    </div>
    <div id="left">
        Left 25%
    </div>
    <div id="center">
        Center 50%
    </div> 
    <div id="right">
        Right 25%
    </div>
    <div id="foo">
    Fooster 100%
    </div>

</div>


    
</body>
</html>
